<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" width="44" height="44" role="img" aria-label="RuntimeAI shield icon">
  <title>RuntimeAI</title>
  <defs>
    <!-- Shine: subtle top-left highlight for depth -->
    <radialGradient id="shine" cx="36%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Stroke: sky → periwinkle → lavender -->
    <linearGradient id="stroke-grad" x1="4" y1="4" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- Glow filter for top vertex dot -->
    <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    SHIELD PATH
    Apex (22,4) → right shoulder (36,11) → straight side to (36,30)
    → angled curve Q(29,38) to bottom tip (22,40)
    → angled curve Q(15,38) back to (8,30)
    → straight side to left shoulder (8,11) → close
  -->

  <!-- Solid fill: indigo-600 -->
  <path d="M22 4 L36 11 L36 30 Q29 38 22 40 Q15 38 8 30 L8 11 Z"
        fill="#4f46e5"/>

  <!-- Shine overlay -->
  <path d="M22 4 L36 11 L36 30 Q29 38 22 40 Q15 38 8 30 L8 11 Z"
        fill="url(#shine)"/>

  <!-- Thick multicolor stroke -->
  <path d="M22 4 L36 11 L36 30 Q29 38 22 40 Q15 38 8 30 L8 11 Z"
        stroke="url(#stroke-grad)" stroke-width="2.8" fill="none" stroke-linejoin="round"/>

  <!-- R letterform — white, stroke-width 3 -->
  <!-- Vertical spine -->
  <line x1="15.5" y1="13.5" x2="15.5" y2="30.5"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Curved bump (two quadratic arcs) -->
  <path d="M15.5 13.5 L23 13.5 Q30 13.5 30 19.5 Q30 25.5 23 25.5 L15.5 25.5"
        stroke="#ffffff" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diagonal leg -->
  <line x1="22" y1="25.5" x2="29.5" y2="30.5"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Top vertex accent dot -->
  <circle cx="22" cy="4.5" r="2.5" fill="#ffffff" opacity="0.92"
          filter="url(#dot-glow)"/>
</svg>
